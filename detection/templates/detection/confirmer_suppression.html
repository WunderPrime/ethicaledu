{% extends 'detection/base.html' %}
{% block titre %}Confirmer la suppression{% endblock %}
{% block contenu %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h5 class="mb-3"><i class="fa-solid fa-triangle-exclamation text-danger"></i> Confirmer la suppression</h5>
            <p>Êtes-vous sûr de vouloir supprimer l'utilisateur <strong>{{ utilisateur.username }}</strong> ? Cette action est irréversible.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 mb-2">Supprimer définitivement</button>
                <a href="{% url 'detection:gerer_utilisateurs' %}" class="btn btn-outline-secondary w-100">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
